name: Daily Auto Commit

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update log - 24f1000637@ds.study.iitm.ac.in
        run: |
          echo "Daily update run at $(date -u)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "24f1000637@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update $(date -u)"
          git push
